name: Sync Upstream

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync fork with upstream
    if: github.repository == '6mb/ios-location-spoofer'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync default branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          result="$(gh api -X POST "repos/${GITHUB_REPOSITORY}/merge-upstream" -f branch=main)"
          echo "$result" | jq .

      - name: Sync extra branches and tags
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/mekos2772/ios-location-spoofer.git
          git fetch upstream --prune --tags

          default_branch="main"

          git for-each-ref --format='%(refname:short) %(objectname)' refs/remotes/upstream | while read -r remote_branch upstream_sha; do
            branch="${remote_branch#upstream/}"

            if [ "$branch" = "HEAD" ] || [ "$branch" = "$default_branch" ]; then
              continue
            fi

            current_sha="$(
              gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/$branch" --jq '.object.sha' 2>/dev/null || true
            )"

            if [ -z "$current_sha" ]; then
              echo "Creating branch: $branch"
              gh api -X POST "repos/${GITHUB_REPOSITORY}/git/refs" \
                -f ref="refs/heads/$branch" \
                -f sha="$upstream_sha" >/dev/null
            elif [ "$current_sha" = "$upstream_sha" ]; then
              echo "Branch already current: $branch"
            else
              echo "Updating branch: $branch"
              if ! gh api -X PATCH "repos/${GITHUB_REPOSITORY}/git/refs/heads/$branch" \
                -f sha="$upstream_sha" \
                -F force=false >/dev/null; then
                echo "Skipping divergent or protected branch: $branch"
              fi
            fi
          done

          origin_tags="$RUNNER_TEMP/origin-tags.txt"
          git ls-remote --tags origin > "$origin_tags"

          git for-each-ref --format='%(refname)' refs/tags | while IFS= read -r tag_ref; do
            tag_name="${tag_ref#refs/tags/}"

            if grep -Fq "refs/tags/$tag_name" "$origin_tags"; then
              continue
            fi

            git push origin "$tag_ref:$tag_ref" || echo "Skipping tag push: $tag_name"
          done

      - name: Sync releases and assets
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REPO: mekos2772/ios-location-spoofer
          TARGET_REPO: ${{ github.repository }}
        run: ./.github/scripts/sync-upstream-releases.sh
